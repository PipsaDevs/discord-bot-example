name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    lint-and-typecheck:
        name: Lint, Format & Typecheck
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Typecheck
              run: npm run build
